<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coffee Website</title>
    <link rel="stylesheet" href="style/style.css">
    <!-- linking for Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <!-- Header / Navbar -->
    <header>
        <nav class="navbar section-content">
            <a href="index.html" class="nav-logo">
                <h2 class="logo-text">☕Coffee</h2>
            </a>
            <ul class="nav-menu">
                <button id="menu-close-button" class="fas fa-times"></button>
                <li class="nav item">
                    <a href="index.html" class="nav-link">Home</a>
                </li>
                 <li class="nav item">
                    <a href="about.html" class="nav-link">About</a>
                </li>
                 <li class="nav item">
                    <a href="menu.html" class="nav-link">Menu</a>
                </li> <li class="nav item">
                    <a href="gallery.html" class="nav-link">Gallery</a>
                </li> <li class="nav item">
                    <a href="contact.html" class="nav-link">Contact</a>              
            </ul>
            <button id="menu-open-button" class="fas fa-bars"></button>
        </nav>
    </header>

    <main>
        <!-- Hero-section -->
        <section class="hero-section">
            <div class="section-content">
                <div class="hero-details">
                    <h2 class="title">Best Coffee</h2>
                    <h3 class="subtitle">Make your day great with our special
                        coffee!</h3>
                    <p class="description">Welcome to our coffee paradaise, where
                        every bean tells a story and every cup sparks joy.</p>
                        <div class="buttons">
                            <a href="menu.html" class="button order-now">Order Now</a>
                            <a href="contact.html" class="button contact-us">Contact Us</a>
                        </div>
                </div>
                <div class="hero-image-wrapper">
                    <img src="images/coffee-hero-section.png" alt="Hero"
                     class="hero-image">
                </div>
            </div>
        </section>

         <!-- Footer section -->
         <footer class="footer-section">
            <div class="section-content">
                <p class="copyright-text">© Coffee Shop</p>                    
                  <p class="policy-text">
                    <a href="#" class="policy-link">Privacy Police</a>
                    <span class="separator">・</span>
                     <a href="#" class="policy-link">Refund Police</a>
                    <span class="separator"> </span>
                 </p>  
                 <div class="social-link-list">
                        <a href="#" class="social-link"><i class="fa-brands fa-facebook"></i></a>
                        <a href="#" class="social-link"><i class="fa-brands fa-instagram"></i></a>
                        <a href="#" class="social-link"><i class="fa-brands fa-whatsapp"></i></a>
                    </div>
            </div>
         </footer>
    </main>

    <script src="script.js"></script>    
</body>
</html>
